<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="High quality browser-based background remover"
    />
    <title>BG Remover Pro v6 HQ</title>
  </head>
  <body>
    <main class="gradio-page">
      <section class="intro">
        <h1>BG Remover Pro v6 HQ</h1>
        <p>
          Default is HQ. First run may download the model, so wait and watch the
          status log.
        </p>
        <p>
          <strong>Best starting point:</strong> HQ General / product, Alpha
          matting ON, Edge adjust -1, Feather 0.
        </p>
      </section>

      <section class="image-row">
        <figure class="image-box">
          <figcaption>Original image</figcaption>
          <div class="image-stage upload-stage" id="dropzone">
            <input id="fileInput" type="file" accept="image/*" />
            <img id="sourcePreview" alt="Original image preview" />
            <span id="sourceEmpty">Drop Image Here<br />- or -<br />Click to Upload</span>
          </div>
        </figure>

        <figure class="image-box">
          <figcaption>Result PNG</figcaption>
          <div class="image-stage checker">
            <img id="resultPreview" alt="Background removal result" />
            <span id="resultEmpty">Output will appear here</span>
          </div>
        </figure>
      </section>

      <section class="form-panel">
        <div class="form-row three">
          <label class="field">
            <span>Quality preset</span>
            <select id="presetSelect">
              <option value="hq" selected>HQ General / product - recommended</option>
              <option value="soft">Soft edges / hair / fur</option>
              <option value="logo">Logo / icon sharp edge</option>
              <option value="human">Human portrait classic</option>
              <option value="classic">Classic U2Net</option>
              <option value="fast">Fast preview only</option>
            </select>
          </label>

          <label class="check-field">
            <input id="alphaMatting" type="checkbox" checked />
            <span>Alpha matting - better edges</span>
          </label>

          <label class="check-field">
            <input id="postProcessMask" type="checkbox" checked />
            <span>Clean mask</span>
          </label>
        </div>

        <div class="form-row three">
          <label class="field">
            <span>Edge adjust: negative removes halo, positive keeps more edge</span>
            <input id="edgeAdjust" type="range" min="-5" max="5" step="1" value="-1" />
            <output id="edgeValue">-1</output>
          </label>

          <label class="field">
            <span>Feather / soft edge</span>
            <input id="feather" type="range" min="0" max="2" step="0.05" value="0" />
            <output id="featherValue">0.00</output>
          </label>

          <label class="field">
            <span>Optional background: empty transparent / #000000 / white</span>
            <input id="previewBg" type="text" value="" placeholder="" />
          </label>
        </div>

        <details class="advanced">
          <summary>Advanced alpha matting settings</summary>

          <div class="form-row three">
            <label class="field">
              <span>Foreground threshold</span>
              <input id="fgThreshold" type="range" min="1" max="255" step="1" value="240" />
              <output id="fgValue">240</output>
            </label>

            <label class="field">
              <span>Background threshold</span>
              <input id="bgThreshold" type="range" min="0" max="254" step="1" value="10" />
              <output id="bgValue">10</output>
            </label>

            <label class="field">
              <span>Erode size</span>
              <input id="erodeSize" type="range" min="1" max="30" step="1" value="10" />
              <output id="erodeValue">10</output>
            </label>
          </div>

          <div class="form-row two">
            <label class="check-field">
              <input id="hardCutToggle" type="checkbox" />
              <span>Hard cut mask - good for logos, bad for hair</span>
            </label>

            <label class="field">
              <span>Hard cut threshold</span>
              <input id="threshold" type="range" min="0" max="255" step="1" value="128" />
              <output id="thresholdValue">128</output>
            </label>
          </div>
        </details>

        <div class="button-row">
          <button id="runButton" type="button">Remove background</button>
          <button id="preloadButton" type="button" class="secondary">Preload model</button>
        </div>

        <label class="file-output">
          <span>PNG download</span>
          <a id="downloadLink" class="download disabled" download="bg-removed.png">
            Download result
          </a>
        </label>

        <label class="status-output">
          <span>Status / log</span>
          <textarea id="logText" rows="12" readonly>Ready.</textarea>
        </label>

        <div class="runtime-line">
          <div class="meter" aria-live="polite">
            <div class="meter-bar" id="meterBar"></div>
          </div>
          <span id="runtimeStatus">Ready</span>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
