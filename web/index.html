  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/webp" href="/favicon.webp" />
    <meta name="description" content="기여움 디자인팀 전용 고품질 무제한 AI 배경 제거 도구" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="기여움 디자인팀 BG Remover" />
    <meta property="og:description" content="기여움 디자인팀 전용 고품질 무제한 AI 배경 제거 도구" />
    <meta property="og:image" content="https://bgremove-cxk.pages.dev/favicon.webp" />
    <meta property="og:url" content="https://bgremove-cxk.pages.dev" />
    <meta name="theme-color" content="#5865f2" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BG Remover for 기여움 디자인팀" />
    <meta name="twitter:description" content="기여움 디자인팀 전용 고품질 무제한 AI 배경 제거 도구" />
    <meta name="twitter:image" content="https://bgremove-cxk.pages.dev/favicon.webp" />
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("heroui-theme") || "dark";
          const theme =
            stored === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : stored;
          document.documentElement.classList.add(theme);
          document.documentElement.setAttribute("data-theme", theme);
        } catch {
          document.documentElement.classList.add("dark");
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <title>BG REMOVER for 기여움 디자인팀</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
