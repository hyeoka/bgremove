<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="브라우저에서 실행되는 고품질 배경 제거 도구"
    />
    <title>BG Remover Pro v6 HQ</title>
  </head>
  <body>
    <main class="app-page">
      <section class="intro">
        <div>
          <p class="eyebrow">브라우저 AI 배경 제거</p>
          <h1>BG Remover Pro v6 HQ</h1>
        </div>
        <p class="intro-copy">
          기본값은 HQ입니다. 첫 실행은 모델 다운로드 때문에 시간이 조금 걸릴 수 있습니다.
        </p>
        <p class="tip">
          추천 시작값: HQ 일반 / 제품, 알파 매팅 켜기, 가장자리 보정 -1, 부드럽게 0
        </p>
      </section>

      <section class="image-row">
        <figure class="image-box">
          <figcaption>원본 이미지</figcaption>
          <div class="image-stage upload-stage" id="dropzone">
            <input id="fileInput" type="file" accept="image/*" />
            <img id="sourcePreview" alt="원본 이미지 미리보기" />
            <span id="sourceEmpty">이미지를 여기에 놓거나<br />클릭해서 업로드</span>
          </div>
        </figure>

        <figure class="image-box">
          <figcaption>결과 PNG</figcaption>
          <div class="image-stage checker">
            <img id="resultPreview" alt="배경 제거 결과" />
            <span id="resultEmpty">처리 결과가 여기에 표시됩니다</span>
          </div>
        </figure>
      </section>

      <section class="form-panel">
        <div class="form-row three">
          <label class="field">
            <span>품질 프리셋</span>
            <select id="presetSelect">
              <option value="hq" selected>HQ 일반 / 제품 - 추천</option>
              <option value="soft">부드러운 가장자리 / 머리카락 / 털</option>
              <option value="logo">로고 / 아이콘 선명한 컷</option>
              <option value="human">인물 사진 클래식</option>
              <option value="classic">클래식 U2Net</option>
              <option value="fast">빠른 미리보기 전용</option>
            </select>
          </label>

          <label class="check-field">
            <input id="alphaMatting" type="checkbox" checked />
            <span>알파 매팅 - 가장자리 개선</span>
          </label>

          <label class="check-field">
            <input id="postProcessMask" type="checkbox" checked />
            <span>마스크 정리</span>
          </label>
        </div>

        <div class="form-row three">
          <label class="field">
            <span>가장자리 보정: 음수는 테두리 제거, 양수는 가장자리 보존</span>
            <input id="edgeAdjust" type="range" min="-5" max="5" step="1" value="-1" />
            <output id="edgeValue">-1</output>
          </label>

          <label class="field">
            <span>부드럽게 / 소프트 엣지</span>
            <input id="feather" type="range" min="0" max="2" step="0.05" value="0" />
            <output id="featherValue">0.00</output>
          </label>

          <label class="field">
            <span>선택 배경: 비우면 투명 / #000000 / white</span>
            <input id="previewBg" type="text" value="" placeholder="비우면 투명 PNG" />
          </label>
        </div>

        <details class="advanced">
          <summary>고급 알파 매팅 설정</summary>

          <div class="form-row three">
            <label class="field">
              <span>전경 기준값</span>
              <input id="fgThreshold" type="range" min="1" max="255" step="1" value="240" />
              <output id="fgValue">240</output>
            </label>

            <label class="field">
              <span>배경 기준값</span>
              <input id="bgThreshold" type="range" min="0" max="254" step="1" value="10" />
              <output id="bgValue">10</output>
            </label>

            <label class="field">
              <span>침식 크기</span>
              <input id="erodeSize" type="range" min="1" max="30" step="1" value="10" />
              <output id="erodeValue">10</output>
            </label>
          </div>

          <div class="form-row two">
            <label class="check-field">
              <input id="hardCutToggle" type="checkbox" />
              <span>하드컷 마스크 - 로고에 좋고 머리카락에는 부적합</span>
            </label>

            <label class="field">
              <span>하드컷 기준값</span>
              <input id="threshold" type="range" min="0" max="255" step="1" value="128" />
              <output id="thresholdValue">128</output>
            </label>
          </div>
        </details>

        <div class="button-row">
          <button id="runButton" type="button">배경 제거</button>
          <button id="preloadButton" type="button" class="secondary">모델 미리 받기</button>
        </div>

        <label class="file-output">
          <span>PNG 다운로드</span>
          <a id="downloadLink" class="download disabled" download="bg-removed.png">
            결과 다운로드
          </a>
        </label>

        <label class="status-output">
          <span>상태 / 로그</span>
          <textarea id="logText" rows="12" readonly>준비됨.</textarea>
        </label>

        <div class="runtime-line">
          <div class="meter" aria-live="polite">
            <div class="meter-bar" id="meterBar"></div>
          </div>
          <span id="runtimeStatus">준비됨</span>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
